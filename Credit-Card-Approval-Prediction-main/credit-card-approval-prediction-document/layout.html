<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Automated Credit Card Approval & Decisioning System. Evaluate credit scoring, debt metrics, and risk classifications instantly.">
    <title>{% block title %}Aura Credit | Intelligent Decisioning{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('customer_dashboard') }}">
                <i class="bi bi-shield-check fs-4 text-cyan"></i>
                <span>AURA<span class="fw-light text-white">DECISION</span></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' or request.path == '/customer' %}active{% endif %}" href="{{ url_for('customer_dashboard') }}">
                            <i class="bi bi-person-workspace me-1"></i> Customer Portal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/analyst' %}active{% endif %}" href="{{ url_for('analyst_dashboard') }}">
                            <i class="bi bi-graph-up-arrow me-1"></i> Credit Analyst
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/compliance' %}active{% endif %}" href="{{ url_for('compliance_dashboard') }}">
                            <i class="bi bi-file-earmark-medical me-1"></i> Compliance & Audit
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Block -->
    <main class="container my-5 flex-shrink-0">
        {% block content %}{% endblock %}
    </main>

    <!-- Professional Footer -->
    <footer>
        <div class="container">
            <div class="row align-items-center justify-content-between">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <p class="mb-0">&copy; 2026 Aura Decisioning Inc. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <span class="text-secondary d-flex align-items-center justify-content-center justify-content-md-end gap-3">
                        <span class="d-flex align-items-center gap-1"><i class="bi bi-cpu text-cyan"></i> ML Core v1.4.0</span>
                        <span>|</span>
                        <span class="d-flex align-items-center gap-1"><i class="bi bi-shield-lock-fill text-indigo"></i> Compliance Secured</span>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS (with Popper) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Child Page Scripts Block -->
    {% block scripts %}{% endblock %}
</body>
</html>
